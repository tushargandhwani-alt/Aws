services:
  db:
    image: mysql:latest
    env_file: .env
    ports:
      - "3307:3306"
    volumes:
      - ./mysql-data:/var/lib/mysql
    networks:
      - my_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "--password=root"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  web:
    build: .
    env_file: .env
    environment:
      - DATABASE_URL=mysql+pymysql://root:root@db:3306/db
    ports:
      - "8000:8000"
    networks:
      - my_network
    depends_on:
      db:
        condition: service_healthy

networks:
  my_network:
    driver: bridge

